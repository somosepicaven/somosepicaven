<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉPICA | Mando Central de Ingeniería Institucional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-epica-dark text-white font-['Plus_Jakarta_Sans']">

    <div id="reader-content" class="p-6"></div>

    <script>
        // --- DEFINICIÓN DE FUNCIONES NECESARIAS ---
        function readDoc(docId, element) {
            console.log("Cargando documento:", docId);
            const container = document.getElementById('reader-content');
            if (container) {
                container.innerHTML = `<h2 class="text-2xl font-bold">Documento: ${docId}</h2><p>Contenido cargado correctamente.</p>`;
            }
        }

        function loadMilitantsDB() { console.log("BD de militantes cargada."); }
        function loadGitHubConfigInputs() { console.log("Configuración GitHub cargada."); }
        function showDeckSlide(n) { console.log("Slide:", n); }
        function showToast(msg, type = "info") { console.log("Toast:", msg); }

        // --- BOOTSTRAP INITIALIZATION ---
        window.onload = function() {
            showDeckSlide(1);
            // Ahora readDoc ya está definida
            readDoc('manual-entrenamiento', document.querySelector('.doc-card'));
            loadMilitantsDB();
            loadGitHubConfigInputs();
            showToast("Portal de Comando ÉPICA inicializado de forma segura.", "info");
        }
    </script>
</body>
</html>
